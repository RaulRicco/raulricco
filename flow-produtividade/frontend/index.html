<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Produtividade — Entrar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a202c;
            --secondary: #2d3748;
            --accent: #63b3ed;
            --accent-dark: #3182ce;
            --text: #e2e8f0;
            --text-muted: #a0aec0;
            --danger: #f56565;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--primary);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background-color: var(--secondary);
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            margin: 1rem;
        }
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo i { font-size: 2.5rem; color: var(--accent); margin-bottom: 0.5rem; }
        .logo h1 { font-size: 1.5rem; font-weight: 700; }
        .logo p { color: var(--text-muted); font-size: 0.875rem; margin-top: 0.25rem; }
        .tabs {
            display: flex;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 1.5rem;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 0.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
            color: var(--text-muted);
        }
        .tab.active {
            background: var(--accent);
            color: white;
            font-weight: 600;
        }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.4rem; }
        input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 0.65rem 1rem;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--accent); }
        .btn {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
            margin-bottom: 0.75rem;
        }
        .btn-primary:hover { background: var(--accent-dark); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-google {
            background: white;
            color: #1a202c;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }
        .btn-google:hover { background: #f7fafc; }
        .btn-google img { width: 20px; height: 20px; }
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1rem 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .error-msg {
            background: rgba(245, 101, 101, 0.15);
            border: 1px solid rgba(245, 101, 101, 0.3);
            color: var(--danger);
            padding: 0.65rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
        }
        .form-section { display: none; }
        .form-section.active { display: block; }
        @media (max-width: 480px) {
            .card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <i class="fas fa-brain"></i>
            <h1>Flow Produtividade</h1>
            <p>Foco, produtividade e resultados</p>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="login">Entrar</div>
            <div class="tab" data-tab="register">Criar conta</div>
        </div>

        <div id="error-msg" class="error-msg"></div>

        <!-- Login -->
        <div class="form-section active" id="login-section">
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="login-password">Senha</label>
                <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button class="btn btn-primary" id="login-btn">Entrar</button>
            <div class="divider">ou</div>
            <button class="btn btn-google" id="google-login-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Entrar com Google
            </button>
        </div>

        <!-- Cadastro -->
        <div class="form-section" id="register-section">
            <div class="form-group">
                <label for="reg-name">Nome</label>
                <input type="text" id="reg-name" placeholder="Seu nome" autocomplete="name">
            </div>
            <div class="form-group">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" placeholder="seu@email.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="reg-password">Senha</label>
                <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="reg-confirm">Confirmar senha</label>
                <input type="password" id="reg-confirm" placeholder="Repita a senha" autocomplete="new-password">
            </div>
            <button class="btn btn-primary" id="register-btn">Criar conta</button>
            <div class="divider">ou</div>
            <button class="btn btn-google" id="google-register-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Cadastrar com Google
            </button>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const API = window.FLOW_API_URL || 'https://flow-produtividade-api.raulriccoads.workers.dev';

        // Se já autenticado, ir direto para o app
        if (localStorage.getItem('flow_token')) {
            window.location.href = 'app.html';
        }

        // Tabs
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + '-section').classList.add('active');
                hideError();
            });
        });

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
        }
        function hideError() {
            document.getElementById('error-msg').style.display = 'none';
        }

        function setLoading(btn, loading) {
            btn.disabled = loading;
            btn.textContent = loading ? 'Aguarde...' : btn.dataset.label;
        }

        // Guardar labels originais
        document.getElementById('login-btn').dataset.label = 'Entrar';
        document.getElementById('register-btn').dataset.label = 'Criar conta';

        // Login
        document.getElementById('login-btn').addEventListener('click', async () => {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            hideError();
            if (!email || !password) return showError('Preencha todos os campos.');
            const btn = document.getElementById('login-btn');
            setLoading(btn, true);
            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) return showError(data.error || 'Erro ao fazer login.');
                localStorage.setItem('flow_token', data.token);
                localStorage.setItem('flow_user', JSON.stringify(data.user));
                window.location.href = 'app.html';
            } catch {
                showError('Erro de conexão. Tente novamente.');
            } finally {
                setLoading(btn, false);
            }
        });

        document.getElementById('login-password').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('login-btn').click();
        });

        // Cadastro
        document.getElementById('register-btn').addEventListener('click', async () => {
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;
            hideError();
            if (!name || !email || !password || !confirm) return showError('Preencha todos os campos.');
            if (password.length < 6) return showError('Senha deve ter pelo menos 6 caracteres.');
            if (password !== confirm) return showError('As senhas não coincidem.');
            const btn = document.getElementById('register-btn');
            setLoading(btn, true);
            try {
                const res = await fetch(`${API}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                if (!res.ok) return showError(data.error || 'Erro ao criar conta.');
                localStorage.setItem('flow_token', data.token);
                localStorage.setItem('flow_user', JSON.stringify(data.user));
                window.location.href = 'app.html';
            } catch {
                showError('Erro de conexão. Tente novamente.');
            } finally {
                setLoading(btn, false);
            }
        });

        // Google OAuth
        function googleAuth() {
            window.location.href = `${API}/auth/google`;
        }
        document.getElementById('google-login-btn').addEventListener('click', googleAuth);
        document.getElementById('google-register-btn').addEventListener('click', googleAuth);
    </script>
</body>
</html>
