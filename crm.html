<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM de Leads | Raul Ricco</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/diagnostico.css">
  <style>
    body { padding: 0; }
    .crm-shell { max-width: 1500px; margin: 0 auto; padding: 32px 24px; }
    .crm-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .crm-header h1 { font-size: 22px; }
    .crm-header-actions { display: flex; align-items: center; gap: 16px; }
    .crm-total-fechado { font-size: 14px; color: var(--text-muted); }
    .crm-total-fechado strong { color: var(--success); font-family: var(--font-display); }

    .login-box { max-width: 380px; margin: 96px auto; }
    .login-box h1 { font-size: 22px; margin-bottom: 24px; text-align: center; }
    .login-box .quiz-field { margin-bottom: 16px; }
    .login-error { color: var(--accent); font-size: 13px; margin-bottom: 16px; display: none; }
    .login-error.visible { display: block; }

    /* ── Kanban ── */
    .kanban-board {
      display: grid;
      grid-template-columns: repeat(5, minmax(240px, 1fr));
      gap: 16px;
      overflow-x: auto;
      padding-bottom: 12px;
      align-items: start;
    }

    .kanban-column {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      min-height: 200px;
    }

    .kanban-column.drag-over { border-color: var(--accent); background: rgba(255, 71, 87, 0.06); }

    .kanban-column-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--text-muted);
    }

    .kanban-column-head .count {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 9px;
      font-size: 12px;
      color: var(--text);
    }

    .kanban-column[data-status="fechado"] .kanban-column-head { color: var(--success); }
    .kanban-column[data-status="descartado"] .kanban-column-head { color: var(--text-muted); }

    .kanban-cards {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
      min-height: 80px;
    }

    .kanban-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      cursor: grab;
      font-size: 13px;
    }

    .kanban-card:active { cursor: grabbing; }
    .kanban-card.dragging { opacity: 0.4; }

    .kanban-card-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .kanban-card-meta { color: var(--text-muted); font-size: 12px; margin-bottom: 2px; }
    .kanban-card-value { color: var(--success); font-weight: 600; font-size: 13px; margin-top: 6px; }

    .kanban-card-links { display: flex; gap: 10px; margin-top: 10px; }
    .kanban-card-links a { color: var(--accent); font-size: 12px; }

    .empty-column { text-align: center; padding: 24px 8px; color: var(--text-muted); font-size: 12px; }
    .btn-sm { padding: 8px 16px; font-size: 13px; }

    .source-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .source-tag.source-google { color: #4285f4; border-color: rgba(66, 133, 244, 0.4); }
    .source-tag.source-meta { color: #0866ff; border-color: rgba(8, 102, 255, 0.4); }
    .source-tag.source-direto { color: var(--text-muted); }

    .kanban-card-notes-indicator { color: var(--accent); font-size: 12px; margin-top: 8px; }

    /* ── Modal de detalhes do lead ── */
    .lead-modal-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(10, 10, 12, 0.85);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .lead-modal-overlay[hidden] { display: none; }

    .lead-modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%; max-width: 520px; max-height: 88vh;
      overflow-y: auto;
      padding: 32px;
      position: relative;
    }

    .lead-modal-close {
      position: absolute; top: 16px; right: 16px;
      width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-muted); font-size: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .lead-modal-close:hover { color: var(--text); border-color: var(--accent); }

    .lead-modal h2 { font-size: 20px; margin-bottom: 4px; }
    .lead-modal .lead-modal-segmento { color: var(--text-muted); font-size: 13px; margin-bottom: 20px; }

    .lead-modal-section { margin-bottom: 20px; }
    .lead-modal-section h3 {
      font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em;
      color: var(--text-muted); margin-bottom: 10px; font-family: var(--font-body); font-weight: 600;
    }

    .lead-modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; font-size: 13px; }
    .lead-modal-grid dt { color: var(--text-muted); font-size: 11px; text-transform: uppercase; }
    .lead-modal-grid dd { margin: 0; }

    .lead-modal-source-list { display: flex; flex-direction: column; gap: 6px; font-size: 13px; }
    .lead-modal-source-list .row { display: flex; justify-content: space-between; gap: 12px; }
    .lead-modal-source-list .row span:first-child { color: var(--text-muted); }
    .lead-modal-source-list .row span:last-child { text-align: right; word-break: break-all; }

    .lead-modal textarea {
      width: 100%; min-height: 120px; padding: 12px 14px;
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text); font-family: inherit; font-size: 14px; resize: vertical;
    }
    .lead-modal textarea:focus { border-color: var(--accent); outline: none; }

    .lead-modal-save-status { font-size: 12px; color: var(--text-muted); margin-top: 8px; min-height: 16px; }

    @media (max-width: 1100px) {
      .kanban-board { grid-template-columns: repeat(5, 260px); }
    }
  </style>
</head>
<body>

  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-WDPHBD9Z');</script>
  <!-- End Google Tag Manager -->

  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WDPHBD9Z"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <div class="crm-shell">
    <div id="loginView" class="login-box" hidden>
      <h1>Acesso ao CRM</h1>
      <form id="loginForm">
        <div class="quiz-field">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <p class="login-error" id="loginError"></p>
        <button type="submit" class="btn btn-primary btn-block">Entrar</button>
      </form>
    </div>

    <div id="crmView" hidden>
      <div class="crm-header">
        <h1>Leads — Diagnóstico Gratuito</h1>
        <div class="crm-header-actions">
          <span class="crm-total-fechado">Fechado no mês: <strong id="totalFechado">R$ 0</strong></span>
          <a href="https://ricco-dashboards.pages.dev" target="_blank" rel="noopener noreferrer" class="btn btn-outline btn-sm">Ver trackeamento</a>
          <button class="btn btn-outline btn-sm" id="logoutBtn">Sair</button>
        </div>
      </div>

      <div class="kanban-board" id="kanbanBoard">
        <div class="kanban-column" data-status="novo">
          <div class="kanban-column-head"><span>Novo</span><span class="count" data-count="novo">0</span></div>
          <div class="kanban-cards" data-cards="novo"></div>
        </div>
        <div class="kanban-column" data-status="em_contato">
          <div class="kanban-column-head"><span>Em contato</span><span class="count" data-count="em_contato">0</span></div>
          <div class="kanban-cards" data-cards="em_contato"></div>
        </div>
        <div class="kanban-column" data-status="qualificado">
          <div class="kanban-column-head"><span>Qualificado</span><span class="count" data-count="qualificado">0</span></div>
          <div class="kanban-cards" data-cards="qualificado"></div>
        </div>
        <div class="kanban-column" data-status="fechado">
          <div class="kanban-column-head"><span>Fechado</span><span class="count" data-count="fechado">0</span></div>
          <div class="kanban-cards" data-cards="fechado"></div>
        </div>
        <div class="kanban-column" data-status="descartado">
          <div class="kanban-column-head"><span>Descartado</span><span class="count" data-count="descartado">0</span></div>
          <div class="kanban-cards" data-cards="descartado"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="lead-modal-overlay" id="leadModalOverlay" hidden>
    <div class="lead-modal" role="dialog" aria-modal="true" aria-labelledby="leadModalName">
      <button class="lead-modal-close" id="leadModalClose" aria-label="Fechar">✕</button>
      <h2 id="leadModalName"></h2>
      <p class="lead-modal-segmento" id="leadModalSegmento"></p>

      <div class="lead-modal-section">
        <h3>Contato e qualificação</h3>
        <dl class="lead-modal-grid">
          <dt>Telefone</dt><dd id="leadModalTelefone"></dd>
          <dt>Email</dt><dd id="leadModalEmail"></dd>
          <dt>Tempo de negócio</dt><dd id="leadModalTempoNegocio"></dd>
          <dt>Já investe em tráfego</dt><dd id="leadModalJaInveste"></dd>
          <dt>Quando investiu</dt><dd id="leadModalQuandoInvestiu"></dd>
          <dt>Disposto a investir</dt><dd id="leadModalQuantoInvestir"></dd>
          <dt>Recebido em</dt><dd id="leadModalCreatedAt"></dd>
        </dl>
      </div>

      <div class="lead-modal-section">
        <h3>Origem do lead</h3>
        <div class="lead-modal-source-list" id="leadModalSource"></div>
      </div>

      <div class="lead-modal-section">
        <h3>Anotações</h3>
        <textarea id="leadModalNotas" placeholder="Anote aqui o histórico de contato, objeções, próximos passos..."></textarea>
        <div class="lead-modal-save-status" id="leadModalSaveStatus"></div>
      </div>
    </div>
  </div>

  <script src="js/crm.js"></script>
</body>
</html>
